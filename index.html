<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportasi MAN 9 Jakarta</title>

    <meta property="og:title" content="Transportasi MAN 9 Jakarta">
    <meta property="og:description" content="Peta interaktif transportasi umum di sekitar MAN 9 Jakarta yang memudahkan pengguna menjelajahi rute Transjakarta dan Mikrotrans.">
    <meta property="og:url" content="https://tfmanine.web.id">
    <meta property="og:image" content="https://tfmanine.web.id/assets/images/tfmanine.web.id_20260326_195500_0000.png">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/svg+xml" href="assets/images/sublogo.svg">
    <meta name="description" content="Transportasi umum menuju MAN 9 Jakarta">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0072bc', accent: '#FF5733' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], data: ['PT Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 bg-primary shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="flex items-center">
                        <img src="assets/images/logo.svg" alt="Transportasi MAN 9 Jakarta" class="h-10 w-auto object-contain">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="relative">
        <div id="map-container" class="w-full h-[400px]"></div>
    </section>

    <section class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-lg font-bold text-gray-800 mb-4 font-sans">Moda Transportasi</h2>
        <div id="category-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
    </section>

    <section id="route-list-section" class="max-w-7xl mx-auto px-4 pb-6 hidden">
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-lg font-bold text-gray-800 font-sans">
                <span id="route-list-title">Daftar Rute</span>
                <span id="route-count" class="text-sm font-normal text-gray-500 ml-2"></span>
            </h2>
            <button onclick="window.clearFilter()" class="text-sm text-primary font-medium hover:underline font-sans">× Tutup</button>
        </div>

        <div class="mb-4 relative">
            <input type="text" id="route-search" placeholder="Cari rute (cth: 4F, Pulo Gadung)..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-sans text-sm shadow-sm pr-10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute right-4 top-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>

        <div id="route-list" class="space-y-3"></div>
    </section>

    <section id="live-update-section" class="max-w-7xl mx-auto px-4 pb-8 mb-12">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold text-gray-800 flex items-center font-sans">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2 text-[#1DA1F2]" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.84 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
                </svg>
                Live Update
            </h2>
            <span class="text-[10px] font-bold px-2 py-1 bg-blue-50 text-primary rounded-md uppercase tracking-wider">Transjakarta</span>
        </div>
        <div id="live-update-container" class="space-y-3">
            <div class="animate-pulse flex space-x-4 bg-white p-4 rounded-xl border border-gray-100">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-2 bg-gray-200 rounded w-1/4"></div>
                    <div class="space-y-2">
                        <div class="h-2 bg-gray-200 rounded"></div>
                        <div class="h-2 bg-gray-200 rounded w-5/6"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-800 text-white py-8 mt-auto">
    </footer>

    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/map.js"></script>
</body>

</html>
