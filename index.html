<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportasi MAN 9 Jakarta</title>

    <meta property="og:title" content="Transportasi MAN 9 Jakarta">
    <meta property="og:description" content="Peta interaktif transportasi umum di sekitar MAN 9 Jakarta yang memudahkan pengguna menjelajahi rute Transjakarta dan Mikrotrans.">
    <meta property="og:url" content="https://tfmanine.web.id">
    <meta property="og:image" content="https://tfmanine.web.id/assets/images/tfmanine.web.id_20260326_195500_0000.png">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/svg+xml" href="assets/images/sublogo.svg">
    <meta name="description" content="Transportasi umum menuju MAN 9 Jakarta">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0072bc', accent: '#FF5733' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], data: ['PT Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 bg-primary shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="flex items-center">
                        <img src="assets/images/logo.svg" alt="Transportasi MAN 9 Jakarta" class="h-10 w-auto object-contain">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="relative w-full h-[65vh] min-h-[400px]">
        <div id="map-container" class="absolute inset-0 w-full h-full bg-gray-200 z-0"></div>
        <div class="absolute bottom-6 left-0 right-0 z-10 pointer-events-none px-4 flex justify-center">
            <div id="map-legend-navbar" class="bg-white/95 backdrop-blur-md px-5 py-3 rounded-full shadow-lg flex gap-4 items-center overflow-x-auto no-scrollbar pointer-events-auto border border-gray-100">
                <div class="legend-item flex items-center gap-2 cursor-pointer transition-all duration-200" data-filter="school" onclick="window.filterMap('school')">
                    <span class="w-2.5 h-2.5 rounded-full bg-[#0072bc]"></span>
                    <span class="text-xs font-bold text-gray-700 whitespace-nowrap font-sans">Sekolah</span>
                </div>
                <div class="legend-item flex items-center gap-2 cursor-pointer transition-all duration-200" data-filter="transit" onclick="window.filterMap('transit')">
                    <span class="w-2.5 h-2.5 rounded-full bg-[#FF5733]"></span>
                    <span class="text-xs font-bold text-gray-700 whitespace-nowrap font-sans">Transit</span>
                </div>
                <div class="legend-item flex items-center gap-2 cursor-pointer transition-all duration-200" data-filter="busstop" onclick="window.filterMap('busstop')">
                    <span class="w-2.5 h-2.5 rounded-full bg-[#22c55e]"></span>
                    <span class="text-xs font-bold text-gray-700 whitespace-nowrap font-sans">Bus Stop Terdekat</span>
                </div>
                <div class="legend-item flex items-center gap-2 cursor-pointer transition-all duration-200" data-filter="busstop_area" onclick="window.filterMap('busstop_area')">
                    <span class="w-2.5 h-2.5 rounded-full bg-[#4b5563]"></span>
                    <span class="text-xs font-bold text-gray-700 whitespace-nowrap font-sans">Bus Stop Sekitar</span>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-lg font-bold text-gray-800 mb-4 font-sans">Moda Transportasi</h2>
        <div id="category-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
    </section>

    <section id="route-list-section" class="max-w-7xl mx-auto px-4 pb-6 hidden flex-1">
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-lg font-bold text-gray-800 font-sans">
                <span id="route-list-title">Daftar Rute</span>
                <span id="route-count" class="text-sm font-normal text-gray-500 ml-2"></span>
            </h2>
            <button onclick="window.clearFilter()" class="text-sm text-primary font-medium hover:underline font-sans">× Tutup</button>
        </div>

        <div class="mb-4 relative">
            <input type="text" id="route-search" placeholder="Cari rute (cth: 4F, Pulo Gadung)..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-sans text-sm shadow-sm pr-10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute right-4 top-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>

        <div id="route-list" class="space-y-3 mb-8"></div>
    </section>

    <footer class="bg-gray-800 text-white py-8 mt-auto w-full">
    </footer>

    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/map.js"></script>
</body>

</html>
