<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Transportasi - MAN 9 Jakarta</title>
    
    <link rel="icon" type="image/svg+xml" href="assets/images/sublogo.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0072bc', accent: '#FF5733' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], data: ['PT Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">
    <nav class="shrink-0 z-50 bg-primary shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div
                        class="bg-blue-600 rounded-full w-10 h-10 flex items-center justify-center text-white font-bold border-2 border-white/20">
                        9</div>
                    <div class="flex flex-col">
                        <span class="text-xs text-blue-200 uppercase tracking-wider font-semibold">Transportasi</span>
                        <span class="text-white font-bold leading-tight">MAN 9 Jakarta</span>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="index.html"
                        class="text-white hover:text-blue-200 transition-colors font-medium text-sm">Beranda</a>
                    <a href="peta.html"
                        class="bg-white/20 text-white px-4 py-1.5 rounded-full transition-colors font-medium text-sm backdrop-blur-sm border border-white/10">Peta</a>
                    <a href="index.html#route-list-section"
                        class="text-white hover:text-blue-200 transition-colors font-medium text-sm">Rute</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-1 relative w-full h-full">
        <div id="map-container" class="absolute inset-0 w-full h-full bg-gray-100 z-0"></div>
        
        <div class="absolute bottom-0 left-0 right-0 h-56 bg-gradient-to-t from-white/95 via-white/50 to-transparent pointer-events-none z-10 backdrop-blur-[2px]"></div>

        <div class="absolute bottom-8 left-4 right-4 z-20 pointer-events-none flex flex-col gap-5">
            
            <div id="map-legend-navbar" class="bg-white/80 backdrop-blur-xl px-6 py-3.5 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] flex gap-5 items-center overflow-x-auto no-scrollbar pointer-events-auto border border-white/60 mx-auto w-max max-w-full">
                <div class="legend-item flex items-center gap-2 cursor-pointer transition-all duration-200" data-filter="school" onclick="window.filterMap('school')">
                    <span class="w-3 h-3 rounded-full bg-[#0072bc] shadow-sm"></span>
                    <span class="text-xs font-bold text-gray-700 whitespace-nowrap font-sans">Sekolah</span>
                </div>
                <div class="legend-item flex items-center gap-2 cursor-pointer transition-all duration-200" data-filter="transit" onclick="window.filterMap('transit')">
                    <span class="w-3 h-3 rounded-full bg-[#FF5733] shadow-sm"></span>
                    <span class="text-xs font-bold text-gray-700 whitespace-nowrap font-sans">Transit</span>
                </div>
                <div class="legend-item flex items-center gap-2 cursor-pointer transition-all duration-200" data-filter="busstop" onclick="window.filterMap('busstop')">
                    <span class="w-3 h-3 rounded-full bg-[#22c55e] shadow-sm"></span>
                    <span class="text-xs font-bold text-gray-700 whitespace-nowrap font-sans">Bus Stop Terdekat</span>
                </div>
                <div class="legend-item flex items-center gap-2 cursor-pointer transition-all duration-200" data-filter="busstop_area" onclick="window.filterMap('busstop_area')">
                    <span class="w-3 h-3 rounded-full bg-[#4b5563] shadow-sm"></span>
                    <span class="text-xs font-bold text-gray-700 whitespace-nowrap font-sans">Bus Stop Sekitar</span>
                </div>
            </div>
            
            <div class="max-w-4xl mx-auto bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.12)] p-6 border border-white/60 pointer-events-auto w-full">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Pilih Jenis Transportasi</h2>
                    <a href="index.html#route-list-section"
                        class="text-sm font-semibold text-primary hover:underline flex items-center">
                        Lihat Semua Rute
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 ml-1" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                    <button onclick="window.location.href='index.html?mode=brt'"
                        class="category-btn group bg-white rounded-[1.5rem] p-5 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all duration-300 flex flex-col items-center justify-center h-36 md:h-44">
                        <img src="assets/images/icon-bus.svg" class="w-16 h-16 md:w-20 md:h-20 object-contain mb-4 transition-transform group-hover:scale-110">
                        <span class="text-[13px] md:text-[15px] font-bold text-gray-800 group-hover:text-primary transition-colors font-sans">Transjakarta</span>
                    </button>
                    <button onclick="window.location.href='index.html?mode=mikro'"
                        class="category-btn group bg-white rounded-[1.5rem] p-5 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all duration-300 flex flex-col items-center justify-center h-36 md:h-44">
                        <img src="assets/images/icon-mikrotrans.svg" class="w-16 h-16 md:w-20 md:h-20 object-contain mb-4 transition-transform group-hover:scale-110">
                        <span class="text-[13px] md:text-[15px] font-bold text-gray-800 group-hover:text-primary transition-colors font-sans">Mikrotrans</span>
                    </button>
                    <button onclick="window.location.href='index.html?mode=krl'"
                        class="category-btn group bg-white rounded-[1.5rem] p-5 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all duration-300 flex flex-col items-center justify-center h-36 md:h-44">
                        <img src="assets/images/icon-train.svg" class="w-16 h-16 md:w-20 md:h-20 object-contain mb-4 transition-transform group-hover:scale-110">
                        <span class="text-[13px] md:text-[15px] font-bold text-gray-800 group-hover:text-primary transition-colors font-sans">KRL</span>
                    </button>
                    <button onclick="window.location.href='index.html?mode=lrt'"
                        class="category-btn group bg-white rounded-[1.5rem] p-5 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all duration-300 flex flex-col items-center justify-center h-36 md:h-44">
                        <img src="assets/images/icon-lrt.svg" class="w-16 h-16 md:w-20 md:h-20 object-contain mb-4 transition-transform group-hover:scale-110">
                        <span class="text-[13px] md:text-[15px] font-bold text-gray-800 group-hover:text-primary transition-colors font-sans">LRT</span>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/map.js"></script>
</body>
</html>
